<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerSpegelt Log</title>

    <link rel="stylesheet" href="style.css">

    <!-- 🔥 IMPORTANT FIX: ensures DOM is ready before JS runs -->
    <script src="app.js" defer></script>
</head>

<body>

    <!-- 🌊 HEADER -->
    <header>
        <h1>🌊 TerSpegelt Log</h1>
        <p>Zomer 2026 — Night Timeline</p>
    </header>

    <!-- 🔎 FILTER BAR -->
    <section id="filterbalk">

        <button id="allePosts" type="button">Alle posts</button>

        <select id="dagFilter">
            <option value="all">Alle dagen</option>
            <option value="1">Dag 1</option>
            <option value="2">Dag 2</option>
            <option value="3">Dag 3</option>
            <option value="4">Dag 4</option>
            <option value="5">Dag 5</option>
            <option value="6">Dag 6</option>
            <option value="7">Dag 7</option>
        </select>

        <select id="categorieFilter">
            <option value="all">Alle categorieën</option>
            <option value="zwemmen">🏊 Zwemmen</option>
            <option value="sterrendisco">🎤 Sterrendisco</option>
            <option value="sport">⚽ Sport</option>
            <option value="eten">🍟 Eten</option>
            <option value="chill">🎮 Chill</option>
            <option value="avond">🌙 Avond</option>
        </select>

    </section>

    <!-- 📅 FEED -->
    <main id="feed"></main>

    <!-- ➕ FLOAT BUTTON -->
    <button id="nieuwePostKnop" type="button">➕</button>

    <!-- 🪟 POPUP -->
    <section id="postPopup">

        <h2>Nieuwe memory</h2>

        <label>Naam</label>
        <input type="text" id="naam">

        <label>Tijd</label>
        <input type="time" id="tijd">

        <label>Dag</label>
        <select id="dag">
            <option value="1">Dag 1</option>
            <option value="2">Dag 2</option>
            <option value="3">Dag 3</option>
            <option value="4">Dag 4</option>
            <option value="5">Dag 5</option>
            <option value="6">Dag 6</option>
            <option value="7">Dag 7</option>
        </select>

        <label>Categorie</label>
        <select id="categorie">
            <option value="zwemmen">🏊 Zwemmen</option>
            <option value="sterrendisco">🎤 Sterrendisco</option>
            <option value="sport">⚽ Sport</option>
            <option value="eten">🍟 Eten</option>
            <option value="chill">🎮 Chill</option>
            <option value="avond">🌙 Avond</option>
        </select>

        <label>Beschrijving</label>
        <textarea id="beschrijving"></textarea>

        <label>Foto's</label>
        <input type="file" id="fotos" multiple>

        <button id="plaatsKnop" type="button">Plaatsen</button>
        <button id="sluitKnop" type="button">Sluiten</button>

    </section>

</body>
</html>
