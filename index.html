<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My TerSpegelt Diary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eaf6ff;
      margin: 0;
    }

    header {
      background: linear-gradient(120deg, #00aaff, #0077ff);
      color: white;
      padding: 40px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #0077ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .entry {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>🌊 My TerSpegelt Diary</h1>
  <p>Write what you did every day</p>
</header>

<div class="container">

  <textarea id="text" placeholder="What did you do today?"></textarea>
  <button onclick="addEntry()">Add Entry</button>

  <div id="entries"></div>

</div>

<script>
  let entries = JSON.parse(localStorage.getItem("diary") || "[]");

  function render() {
    const container = document.getElementById("entries");
    container.innerHTML = "";

    entries.slice().reverse().forEach(e => {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <div class="date">${e.date}</div>
        <div>${e.text}</div>
      `;
      container.appendChild(div);
    });
  }

  function addEntry() {
    const text = document.getElementById("text").value;
    if (!text) return;

    const entry = {
      text,
      date: new Date().toLocaleString()
    };

    entries.push(entry);
    localStorage.setItem("diary", JSON.stringify(entries));

    document.getElementById("text").value = "";
    render();
  }

  render();
</script>

</body>
</html>
