<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mijn TerSpegelt Dagboek</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eaf6ff;
      margin: 0;
    }

    header {
      background: linear-gradient(120deg, #00aaff, #0077ff);
      color: white;
      padding: 40px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #0077ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .entry {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .datum {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>🌊 Mijn TerSpegelt Dagboek</h1>
  <p>Schrijf elke dag wat je hebt gedaan</p>
</header>

<div class="container">

  <textarea id="invoer" placeholder="Wat heb je vandaag gedaan?"></textarea>
  <button onclick="voegToe()">Voeg toe</button>

  <div id="entries"></div>

</div>

<script>
  // Laad opgeslagen entries uit browser
  let entries = JSON.parse(localStorage.getItem("dagboek") || "[]");

  function render() {
    const container = document.getElementById("entries");
    container.innerHTML = "";

    entries.slice().reverse().forEach(e => {
      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <div class="datum">${e.datum}</div>
        <div>${e.tekst}</div>
      `;

      container.appendChild(div);
    });
  }

  function voegToe() {
    const tekst = document.getElementById("invoer").value;
    if (!tekst) return;

    const entry = {
      tekst: tekst,
      datum: new Date().toLocaleString("nl-NL")
    };

    entries.push(entry);
    localStorage.setItem("dagboek", JSON.stringify(entries));

    document.getElementById("invoer").value = "";
    render();
  }

  render();
</script>

</body>
</html>
